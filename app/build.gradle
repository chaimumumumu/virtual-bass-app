apply plugin: 'com.android.application'

android {
    namespace 'com.bass.vb'
    compileSdk 34

    defaultConfig {
        applicationId "com.bass.vb"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
